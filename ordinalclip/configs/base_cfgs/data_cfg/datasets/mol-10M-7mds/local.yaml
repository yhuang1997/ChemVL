data_cfg:
  data_root: "{CHEMVL_DATA_ROOT}/pretraining_datasets/"
  paths:
    train_images_root: images-10M@224px/train_data
    val_images_root: images-10M@224px/test_data
    test_images_root: images-10M@224px/test_data
    train_data_file: 10M-7mds/train_data/data_list/train.txt
    val_data_file: 10M-7mds/test_data/data_list/test.txt
    test_data_file: 10M-7mds/test_data/data_list/test.txt
  train_dataloder_cfg:
    num_workers: 8
    batch_size: 64
    shuffle: true
  eval_dataloder_cfg:
    num_workers: 8
    batch_size: 32
    shuffle: false
runner_cfg:
  output_dir: results/pretraining/10M-7mds
  multi_task_scheme: random
  model_cfg:
    type: OrdinalCLIPForMultiTask
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_tasks: 7
      num_ranks:
        - 892
        - 83
        - 231
        - 654
        - 439
        - 124
        - 413
      num_base_ranks: 3
      num_tokens_per_rank: 1
      num_context_tokens: 10
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: RN50
    image_encoder_name: RN50
trainer_cfg:
  precision: 16
  accelerator: gpu
  devices: 1
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 1
  fast_dev_run: false
multitask: true

