data_cfg:
  representation: graph
  data_root: "{CHEMVL_DATA_ROOT}/pretraining_datasets/"
  paths:
    train_images_root: null
    val_images_root: null
    test_images_root: null
    train_data_file: 1M-7mds/train_data/data_list/train.txt
    val_data_file: 1M-7mds/test_data/data_list/test.txt
    test_data_file: 1M-7mds/test_data/data_list/test.txt
  graph_metadata_file: 1M-7mds/mds.csv
  train_dataloder_cfg:
    num_workers: 4
    batch_size: 64
    shuffle: true
  eval_dataloder_cfg:
    num_workers: 4
    batch_size: 64
    shuffle: false
runner_cfg:
  output_dir: results/pretraining/1M-7mds-graph-gcn
  multi_task_scheme: random
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_prompt_learner_context: 0.0001
      lr_prompt_learner_ranks: 0.0001
      lr_image_encoder: 0.0
      lr_graph_encoder: 0.0001
      lr_text_encoder: 0.0
      lr_logit_scale: 0.0
      staged_lr_image_encoder:
        new_layers: []
        base_lr_mult: 1.0
        new_lr_mult: 1.0
    optimizer_cfg:
      optimizer_name: radam
      lr: 0.0001
      weight_decay: 0.0
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: multi_step
      stepsize:
        - 60
      gamma: 0.1
      max_epochs: 100
      warmup_epoch: 0
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: constant
      warmup_recount: true
  model_cfg:
    type: GraphOrdinalCLIPForMultiTask
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_tasks: 7
      num_ranks:
        - 567
        - 61
        - 103
        - 365
        - 174
        - 119
        - 265
      num_base_ranks: 3
      num_tokens_per_rank: 1
      num_context_tokens: 10
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: RN50
    graph_encoder_cfg:
      type: MolCLRGCN
      num_layer: 5
      emb_dim: 300
      feat_dim: 256
      drop_ratio: 0.1
      pool: mean
multitask: true
