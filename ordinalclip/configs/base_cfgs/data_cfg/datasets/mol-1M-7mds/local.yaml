data_cfg:
  data_root: "{CHEMVL_DATA_ROOT}/pretraining_datasets/"
  paths:
    train_images_root: images-1M@224px/train_data
    val_images_root: images-1M@224px/test_data
    test_images_root: images-1M@224px/test_data
    train_data_file: 1M-7mds/train_data/data_list/train.txt
    val_data_file: 1M-7mds/test_data/data_list/test.txt
    test_data_file: 1M-7mds/test_data/data_list/test.txt
  train_dataloder_cfg:
    num_workers: 4
    batch_size: 64
    shuffle: true
runner_cfg:
  output_dir: results/pretraining/1M-7mds
  multi_task_scheme: random
  model_cfg:
    type: OrdinalCLIPForMultiTask
    prompt_learner_cfg:
      type: PlainPromptLearner
      num_tasks: 7
      num_ranks:
        - 567
        - 61
        - 103
        - 365
        - 174
        - 119
        - 265
      num_base_ranks: 3
      num_tokens_per_rank: 1
      num_context_tokens: 10
      rank_tokens_position: tail
      init_rank_path: null
      init_context: null
      rank_specific_context: false
      interpolation_type: linear
    text_encoder_name: RN50
    image_encoder_name: RN50
multitask: true

