# Provenance (maintainer): knowledge-attention case molecules (BBBP + BACE).
id: knowledge_cases
title: Knowledge-attention case studies
mode: knowledge_cases

defaults:
  task_id: 0
  batch_size: 4
  num_workers: 2
  top_k: 15
  figsize_cm: [18, 6]
  dpi: 150
  formats:
    - png

checkpoint_root: "{CHEMVL_DATA_ROOT}/checkpoints/finetuning/presets/knowledge_prompt_tuning"

cases:
  - name: Cebaracetam
    dataset: bbbp
    smiles: "C1=CC(=CC=C1C3CN(CC(N2CC(NCC2)=O)=O)C(C3)=O)Cl"
    label: 1
  - name: Dinazafone
    dataset: bbbp
    smiles: "C1=C(C(=CC=C1Cl)N(C(CNCC(C)=C)=O)C)C(C2=CC=CC=C2)=O"
    label: 1
  - name: CHEMBL1092788
    dataset: bace
    smiles: "Fc1ccc(F)cc1-c1cc(ccc1)[C@]1(N=C(N)N(C)C1=O)c1ccncc1"
    label: 1
  - name: 3ivi
    dataset: bace
    smiles: "Fc1cc(cc(F)c1)C[C@H](NC(=O)C)[C@H](O)C[NH2+][C@]1(CCc2n[nH]cc2C1)c1cc(ccc1)C(C)(C)C"
    label: 1
